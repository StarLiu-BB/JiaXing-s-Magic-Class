server:
  port: ${ZHIXUE_GATEWAY_PORT:19001}

spring:
  data:
    redis:
      host: ${ZHIXUE_REDIS_HOST:127.0.0.1}
      port: ${ZHIXUE_REDIS_PORT:6379}
      password: ${ZHIXUE_REDIS_PASSWORD:}
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true
  cloud:
    gateway:
      # CORS 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
              - "http://localhost:9208"
              - "http://127.0.0.1:3000"
              - "http://127.0.0.1:3001"
              - "http://127.0.0.1:9208"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: zhixue-auth
          uri: lb://zhixue-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: zhixue-course
          uri: lb://zhixue-course
          predicates:
            - Path=/course/**
          filters:
            - StripPrefix=1
        - id: zhixue-system
          uri: lb://zhixue-system
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=1
        - id: zhixue-ai
          uri: lb://zhixue-ai
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=1
        - id: zhixue-marketing
          uri: lb://zhixue-marketing
          predicates:
            - Path=/marketing/**
          filters:
            - StripPrefix=1
        - id: zhixue-order
          uri: lb://zhixue-order
          predicates:
            - Path=/order/**,/pay/**
        - id: zhixue-media
          uri: lb://zhixue-media
          predicates:
            - Path=/media/**
        - id: zhixue-interaction
          uri: lb://zhixue-interaction
          predicates:
            - Path=/course/interaction/**,/danmaku/**
    sentinel:
      transport:
        dashboard: ${ZHIXUE_SENTINEL_DASHBOARD:127.0.0.1:8858}
        port: ${ZHIXUE_SENTINEL_PORT:8719}

management:
  endpoints:
    web:
      exposure:
        # 暴露 Prometheus 端点，供 Prometheus 抓取指标
        include: health,info,gateway,prometheus

zhixue:
  security:
    jwt-secret: ${ZHIXUE_JWT_SECRET:emhpeHVlY2xvdWRqd3RzZWNyZXRrZXkyMDI0bXVzdGJlYXRsZWFzdDI1NmJpdHNsb25n}
    jwt-expiration: ${ZHIXUE_JWT_EXPIRATION:7200}
    internal-token: ${ZHIXUE_INTERNAL_TOKEN:local-dev-internal-token-change-before-prod}

security:
  whitelist:
    - /auth/login
    - /auth/register
    - /auth/captcha
    - /course/list
    - /course/banner/list
    - /course/hot/list
    - /course/latest/list
    - /course/category/list
    - /course/detail/**
    - /course/info/*
    - /course/*/chapters
    - /course/*/reviews

logging:
  level:
    com.zhixue: INFO
