server:
  port: ${ZHIXUE_GATEWAY_PORT:19001}

spring:
  application:
    name: zhixue-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    nacos:
      server-addr: ${ZHIXUE_NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${ZHIXUE_NACOS_NAMESPACE:public}
        group: ${ZHIXUE_NACOS_GROUP:DEFAULT_GROUP}
        enabled: true
      # 配置中心
      config:
        namespace: ${ZHIXUE_NACOS_NAMESPACE:public}
        group: ${ZHIXUE_NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        enabled: ${ZHIXUE_NACOS_CONFIG_ENABLED:false}
        # 共享配置
        shared-configs:
          - data-id: application-common.yml
            group: ${ZHIXUE_NACOS_GROUP:DEFAULT_GROUP}
            refresh: true
