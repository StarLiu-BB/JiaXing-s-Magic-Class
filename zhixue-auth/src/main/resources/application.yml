server:
  port: 9100

spring:
  main:
    allow-bean-definition-overriding: true
  data:
    redis:
      host: ${ZHIXUE_REDIS_HOST:127.0.0.1}
      port: ${ZHIXUE_REDIS_PORT:6379}
      password: ${ZHIXUE_REDIS_PASSWORD:}

# Security configuration should be stored in Nacos with encryption
# See .kiro/specs/security-hardening/CONFIGURATION.md for setup instructions
zhixue:
  security:
    jwt-secret: ${ZHIXUE_JWT_SECRET:emhpeHVlY2xvdWRqd3RzZWNyZXRrZXkyMDI0bXVzdGJlYXRsZWFzdDI1NmJpdHNsb25n}
    jwt-expiration: ${ZHIXUE_JWT_EXPIRATION:7200}
    internal-token: ${ZHIXUE_INTERNAL_TOKEN:local-dev-internal-token-change-before-prod}
  auth:
    sms:
      mode: ${ZHIXUE_AUTH_SMS_MODE:sandbox}
      sandbox-code: ${ZHIXUE_AUTH_SMS_SANDBOX_CODE:123456}
    wechat:
      mode: ${ZHIXUE_AUTH_WECHAT_MODE:sandbox}
      sandbox-username: ${ZHIXUE_AUTH_WECHAT_SANDBOX_USERNAME:student}

security:
  whitelist:
    - /auth/login
    - /auth/register
    - /auth/captcha

logging:
  level:
    com.zhixue: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
