server:
  port: 9207

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${ZHIXUE_DB_HOST:127.0.0.1}:${ZHIXUE_DB_PORT:3306}/zhixue_marketing?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${ZHIXUE_DB_USERNAME:root}
    password: ${ZHIXUE_DB_PASSWORD:}
  data:
    redis:
      host: ${ZHIXUE_REDIS_HOST:127.0.0.1}
      port: ${ZHIXUE_REDIS_PORT:6379}
      password: ${ZHIXUE_REDIS_PASSWORD:}

mybatis-flex:
  mapper-locations: classpath*:mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true

xxl:
  job:
    admin:
      addresses: ${ZHIXUE_XXL_JOB_ADDR:http://127.0.0.1:8180/xxl-job-admin}
    accessToken:
    executor:
      appname: zhixue-marketing-executor
      address:
      ip:
      port: 9997
      logpath: logs/xxl-job
      logretentiondays: 30

marketing:
  seckill:
    stock-key-prefix: "seckill:stock:"
    user-key-prefix: "seckill:users:"
    token-key-prefix: "seckill:token:"

logging:
  level:
    com.zhixue: INFO

zhixue:
  integration:
    marketing:
      mode: ${ZHIXUE_MARKETING_MODE:sandbox}
