spring:
  application:
    name: zhixue-system
  cloud:
    nacos:
      server-addr: ${ZHIXUE_NACOS_ADDR:127.0.0.1:8848}
      discovery:
        namespace: ${ZHIXUE_NACOS_NAMESPACE:public}
        group: ${ZHIXUE_NACOS_GROUP:DEFAULT_GROUP}
        enabled: true
        heart-beat-interval: 5000
        heart-beat-timeout: 15000

logging:
  level:
    com.alibaba.nacos: INFO
