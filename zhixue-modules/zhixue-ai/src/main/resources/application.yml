server:
  port: 9208

spring:
  application:
    name: zhixue-ai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${ZHIXUE_DB_HOST:127.0.0.1}:${ZHIXUE_DB_PORT:3306}/zhixue_ai?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${ZHIXUE_DB_USERNAME:root}
    password: ${ZHIXUE_DB_PASSWORD:}
  data:
    elasticsearch:
      repositories:
        enabled: ${ZHIXUE_AI_ES_REPOSITORIES_ENABLED:false}
  elasticsearch:
    uris: ${ZHIXUE_ES_URIS:http://127.0.0.1:9200}
  main:
    allow-bean-definition-overriding: true

mybatis-flex:
  mapper-locations: classpath*:mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
zhipuai:
  api-key: ${ZHIXUE_ZHIPU_API_KEY:}
  model: ${ZHIXUE_ZHIPU_MODEL:glm-4-flash}
  timeout: ${ZHIXUE_ZHIPU_TIMEOUT:60}
  enabled: ${ZHIXUE_ZHIPU_ENABLED:false}
ai:
  dashscope:
    api-key: ${ZHIXUE_DASHSCOPE_API_KEY:}
    model: ${ZHIXUE_DASHSCOPE_MODEL:qwen-plus}

logging:
  level:
    com.zhixue: INFO

zhixue:
  integration:
    ai:
      mode: ${ZHIXUE_AI_MODE:sandbox}
