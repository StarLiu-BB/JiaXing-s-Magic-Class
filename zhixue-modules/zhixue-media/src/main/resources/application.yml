server:
  port: 9203

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${ZHIXUE_DB_HOST:127.0.0.1}:${ZHIXUE_DB_PORT:3306}/zhixue_media?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${ZHIXUE_DB_USERNAME:root}
    password: ${ZHIXUE_DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB

mybatis-flex:
  mapper-locations: classpath*:mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true

minio:
  endpoint: ${ZHIXUE_MINIO_ENDPOINT:http://127.0.0.1:9000}
  external-url: ${ZHIXUE_MINIO_EXTERNAL_URL:http://127.0.0.1:9000}
  access-key: ${ZHIXUE_MINIO_ACCESS_KEY:}
  secret-key: ${ZHIXUE_MINIO_SECRET_KEY:}
  bucket: ${ZHIXUE_MINIO_BUCKET:zhixue-media}
  chunk-path: ${ZHIXUE_MINIO_CHUNK_PATH:chunks}

media:
  ffmpeg-path: ffmpeg

logging:
  level:
    com.zhixue: INFO

management:
  health:
    redis:
      enabled: false

zhixue:
  integration:
    media-storage:
      mode: ${ZHIXUE_MEDIA_STORAGE_MODE:sandbox}
