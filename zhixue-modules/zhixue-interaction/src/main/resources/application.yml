server:
  port: 9205

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${ZHIXUE_DB_HOST:127.0.0.1}:${ZHIXUE_DB_PORT:3306}/zhixue_interaction?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${ZHIXUE_DB_USERNAME:root}
    password: ${ZHIXUE_DB_PASSWORD:}
  data:
    redis:
      host: ${ZHIXUE_REDIS_HOST:127.0.0.1}
      port: ${ZHIXUE_REDIS_PORT:6379}
      password: ${ZHIXUE_REDIS_PASSWORD:}
  rabbitmq:
    host: ${ZHIXUE_RABBITMQ_HOST:127.0.0.1}
    port: ${ZHIXUE_RABBITMQ_PORT:5672}
    username: ${ZHIXUE_RABBITMQ_USERNAME:guest}
    password: ${ZHIXUE_RABBITMQ_PASSWORD:guest}
    virtual-host: ${ZHIXUE_RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3

mybatis-flex:
  mapper-locations: classpath*:mapper/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true

interaction:
  websocket-port: 9999
  danmaku-queue: queue_danmaku
  danmaku-exchange: exchange_danmaku
  danmaku-routing-key: danmaku.broadcast
  sensitive-words: ${ZHIXUE_SENSITIVE_WORDS:傻逼,垃圾,色情,赌博,欺诈}

logging:
  level:
    com.zhixue: INFO

zhixue:
  security:
    jwt-secret: ${ZHIXUE_JWT_SECRET:emhpeHVlY2xvdWRqd3RzZWNyZXRrZXkyMDI0bXVzdGJlYXRsZWFzdDI1NmJpdHNsb25n}
    jwt-expiration: ${ZHIXUE_JWT_EXPIRATION:7200}
  integration:
    interaction-mq:
      mode: ${ZHIXUE_INTERACTION_MQ_MODE:sandbox}
